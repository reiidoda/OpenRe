    dev_metrics:
      task_quality: 0.88
      trace_quality: 0.70
      safety_compliance: 0.95
      latency_score: 0.70
      cost_efficiency: 0.70
    test_metrics:
      task_quality: 0.85
      trace_quality: 0.68
      safety_compliance: 0.95
      latency_score: 0.68
      cost_efficiency: 0.68
  - candidate_id: candidate_b
    dev_metrics:
      task_quality: 0.80
      trace_quality: 0.72
      safety_compliance: 0.95
      latency_score: 0.72
      cost_efficiency: 0.72
    test_metrics:
      task_quality: 0.76
      trace_quality: 0.70
      safety_compliance: 0.93
      latency_score: 0.70
      cost_efficiency: 0.70
