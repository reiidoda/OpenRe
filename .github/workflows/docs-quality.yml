name: Docs Quality

on:
  pull_request:
    paths:
      - "**/*.md"
      - "scripts/check_markdown_links.py"
      - ".github/workflows/docs-quality.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "scripts/check_markdown_links.py"
      - ".github/workflows/docs-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 scripts/check_markdown_links.py
