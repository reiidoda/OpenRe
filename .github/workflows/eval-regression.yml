name: Eval Regression

on:
  pull_request:

permissions:
  contents: read

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e .[dev]
      - name: Run configurable regression gate
        run: |
          python scripts/run_regression_gate.py \
            --config configs/ci/regression_gate.yaml \
            --artifact-root .artifacts \
            --output .artifacts/regression/gate_report.json
      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-gate-artifacts
          path: |
            .artifacts/regression/gate_report.json
            .artifacts/reports/**/v1/report.json
            .artifacts/traces/**/trace.jsonl
