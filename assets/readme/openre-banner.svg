<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OpenRe monochrome banner</title>
  <desc id="desc">Dark, minimal neural-tech banner with centered OpenRe text.</desc>

  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020202"/>
      <stop offset="0.55" stop-color="#080808"/>
      <stop offset="1" stop-color="#020202"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 260) rotate(90) scale(210 680)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <pattern id="scanlines" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="6" height="1" fill="white" fill-opacity="0.04"/>
    </pattern>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow" x="-30%" y="-100%" width="160%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="soft"/>
      <feMerge>
        <feMergeNode in="soft"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="520" fill="url(#bgGradient)"/>
  <rect width="1600" height="520" fill="url(#scanlines)" opacity="0.45"/>
  <rect width="1600" height="520" fill="url(#centerGlow)"/>

  <g opacity="0.34" filter="url(#softGlow)" stroke="#F4F4F4" stroke-width="1.4">
    <path d="M68 114C262 114 338 198 482 198C646 198 728 96 862 96C1054 96 1118 232 1308 232C1412 232 1490 196 1534 170"/>
    <path d="M42 380C246 380 318 298 468 298C634 298 706 430 884 430C1034 430 1160 322 1318 322C1432 322 1512 356 1560 392"/>
    <path d="M110 250H1490" opacity="0.35"/>
  </g>

  <g fill="#FFFFFF" fill-opacity="0.78">
    <circle cx="308" cy="198" r="3.4"/>
    <circle cx="640" cy="198" r="3.4"/>
    <circle cx="1098" cy="232" r="3.4"/>
    <circle cx="468" cy="298" r="3.4"/>
    <circle cx="884" cy="430" r="3.4"/>
    <circle cx="1318" cy="322" r="3.4"/>
  </g>

  <g filter="url(#textGlow)">
    <text
      x="800"
      y="276"
      text-anchor="middle"
      font-family="SF Pro Display, SF Pro Text, Helvetica Neue, Helvetica, Arial, sans-serif"
      font-size="112"
      font-weight="620"
      letter-spacing="1.5"
      fill="#FFFFFF"
    >OpenRe</text>
  </g>

  <text
    x="800"
    y="318"
    text-anchor="middle"
    font-family="SF Mono, JetBrains Mono, Menlo, Monaco, Consolas, monospace"
    font-size="18"
    letter-spacing="5"
    fill="#D6D6D6"
    fill-opacity="0.72"
  >BENCHMARK • TRACE • SAFETY</text>

  <rect x="64" y="64" width="1472" height="392" rx="14" stroke="white" stroke-opacity="0.15"/>
</svg>
